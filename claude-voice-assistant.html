<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude — Voice Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #c8a96e;
    --accent2: #7b8cde;
    --text: #e8e6df;
    --muted: #6b6b7a;
    --glow: rgba(200, 169, 110, 0.15);
    --glow2: rgba(123, 140, 222, 0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, var(--glow2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ORB */
  .orb-container {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 20px auto 36px;
    cursor: pointer;
    z-index: 1;
  }

  .orb {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a2a4a, #0d0d1a);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .orb::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(200,169,110,0.18), transparent 60%);
  }

  .orb-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid transparent;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .orb-ring2 {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(123,140,222,0.15);
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.8s ease;
    animation: none;
  }

  .orb-icon {
    font-size: 48px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
    user-select: none;
  }

  .orb-container:hover .orb { transform: scale(1.04); }
  .orb-container:hover .orb-ring { opacity: 0.7; }
  .orb-container:hover .orb-ring2 { opacity: 1; }

  /* Listening state */
  .orb-container.listening .orb {
    background: radial-gradient(circle at 35% 35%, #1a2040, #0d0d1a);
    box-shadow: 0 0 40px rgba(123,140,222,0.3), 0 0 80px rgba(123,140,222,0.1);
    animation: pulse-listen 1.4s ease-in-out infinite;
  }
  .orb-container.listening .orb-ring { opacity: 1; animation: rotate-ring 3s linear infinite; }
  .orb-container.listening .orb-ring2 { opacity: 1; animation: pulse-ring 1.4s ease-in-out infinite; }

  /* Thinking state */
  .orb-container.thinking .orb {
    box-shadow: 0 0 30px rgba(200,169,110,0.25);
    animation: pulse-think 2s ease-in-out infinite;
  }
  .orb-container.thinking .orb-icon { animation: spin-slow 4s linear infinite; }

  /* Speaking state */
  .orb-container.speaking .orb {
    box-shadow: 0 0 50px rgba(200,169,110,0.35), 0 0 100px rgba(200,169,110,0.1);
    animation: pulse-speak 0.8s ease-in-out infinite;
  }

  @keyframes pulse-listen { 0%,100%{box-shadow:0 0 30px rgba(123,140,222,0.25)} 50%{box-shadow:0 0 60px rgba(123,140,222,0.5)} }
  @keyframes pulse-think { 0%,100%{box-shadow:0 0 20px rgba(200,169,110,0.15)} 50%{box-shadow:0 0 40px rgba(200,169,110,0.35)} }
  @keyframes pulse-speak { 0%,100%{box-shadow:0 0 30px rgba(200,169,110,0.3)} 50%{box-shadow:0 0 70px rgba(200,169,110,0.6)} }
  @keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.1);opacity:1} }
  @keyframes rotate-ring { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .status-label {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
    height: 18px;
    transition: color 0.3s;
  }
  .status-label.active { color: var(--accent2); }
  .status-label.speaking { color: var(--accent); }

  /* Transcript area */
  .conversation {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 380px;
    overflow-y: auto;
    padding: 4px 0 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fade-in 0.4s ease;
  }

  @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .message-role {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 52px;
    padding-top: 3px;
  }

  .message.assistant .message-role { color: var(--accent); }

  .message-text {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text);
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
    padding: 12px 16px;
  }

  .message.user .message-text {
    background: transparent;
    border-color: #1e1e2e;
    color: #a0a0b0;
    border-radius: 12px 12px 2px 12px;
  }

  /* Text input area */
  .input-area {
    width: 100%;
    max-width: 640px;
    margin-top: 20px;
    position: relative;
    z-index: 1;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent2); }

  #text-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 4px 0;
  }

  #text-input::placeholder { color: var(--muted); }

  .btn {
    background: var(--border);
    border: 1px solid #2a2a3e;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }

  .btn:hover { background: #2a2a40; border-color: var(--accent2); color: var(--accent2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .btn.primary:hover { background: #d4b87e; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    justify-content: space-between;
    align-items: center;
  }

  .mic-hint {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .voice-controls { display: flex; gap: 8px; }

  /* Error banner */
  .error-banner {
    background: rgba(200,80,80,0.1);
    border: 1px solid rgba(200,80,80,0.3);
    color: #e08080;
    font-size: 0.78rem;
    padding: 10px 16px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
    max-width: 640px;
    width: 100%;
    z-index: 1;
  }

  .divider {
    width: 100%;
    max-width: 640px;
    height: 1px;
    background: var(--border);
    margin: 20px 0 0;
    z-index: 1;
    position: relative;
  }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.active { opacity: 1; }
  .waveform span {
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    animation: wave 0.9s ease-in-out infinite;
    height: 4px;
  }
  .waveform span:nth-child(2) { animation-delay: 0.1s; }
  .waveform span:nth-child(3) { animation-delay: 0.2s; }
  .waveform span:nth-child(4) { animation-delay: 0.3s; }
  .waveform span:nth-child(5) { animation-delay: 0.15s; }
  @keyframes wave {
    0%,100%{height:4px;background:var(--accent2)}
    50%{height:22px;background:var(--accent)}
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 40px 20px;
    line-height: 1.8;
  }

  .system-msg {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Meet <span>Claude</span></h1>
  <p>Your intelligent voice assistant</p>
</div>

<div class="orb-container" id="orb" onclick="toggleListening()">
  <div class="orb-ring"></div>
  <div class="orb-ring2"></div>
  <div class="orb">
    <div class="orb-icon" id="orb-icon">🎙️</div>
  </div>
</div>

<div class="waveform" id="waveform">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="status-label" id="status">Tap orb or type below</div>

<div class="conversation">
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      Tap the orb to speak, or type a message.<br>
      Ask me anything — I'm much smarter than Alexa.
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="text-input" placeholder="Or type your message here…" autocomplete="off" />
    <button class="btn primary" id="send-btn" onclick="sendText()">Send</button>
  </div>
  <div class="controls">
    <span class="mic-hint" id="mic-hint">🎙️ Voice recognition ready</span>
    <div class="voice-controls">
      <button class="btn" id="tts-toggle" onclick="toggleTTS()">🔊 Voice On</button>
      <button class="btn" onclick="clearConversation()">Clear</button>
    </div>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<script>
  // ─── State ───────────────────────────────────────────────
  let conversation = [];
  let isListening = false;
  let isThinking = false;
  let isSpeaking = false;
  let recognition = null;
  let ttsEnabled = true;
  let currentUtterance = null;

  // ─── Elements ────────────────────────────────────────────
  const orb = document.getElementById('orb');
  const orbIcon = document.getElementById('orb-icon');
  const statusEl = document.getElementById('status');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const ttsToggle = document.getElementById('tts-toggle');
  const waveform = document.getElementById('waveform');
  const errorBanner = document.getElementById('error-banner');
  const micHint = document.getElementById('mic-hint');

  // ─── Speech Recognition ──────────────────────────────────
  let autoListen = false; // true once user has activated voice mode
  let restartPending = false;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-GB';

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      isListening = false;
      setOrbState('thinking');
      processInput(text);
    };

    recognition.onerror = (e) => {
      isListening = false;
      if (e.error === 'no-speech') {
        // Silently restart if in auto mode
        if (autoListen && !isThinking && !isSpeaking) {
          setTimeout(() => safeStartListening(), 300);
        } else {
          setOrbState('idle');
        }
      } else if (e.error !== 'aborted') {
        showError('Microphone error: ' + e.error);
        setOrbState('idle');
      }
    };

    recognition.onend = () => {
      if (isListening) {
        isListening = false;
        // Auto-restart if still in voice mode and not busy
        if (autoListen && !isThinking && !isSpeaking) {
          setTimeout(() => safeStartListening(), 200);
        } else {
          setOrbState('idle');
        }
      }
    };
  } else {
    micHint.textContent = '⚠️ Voice not supported — use text input';
    orb.style.opacity = '0.5';
    orb.style.cursor = 'default';
    orb.onclick = null;
  }

  function safeStartListening() {
    if (!recognition || isListening || isThinking || isSpeaking) return;
    try {
      isListening = true;
      setOrbState('listening');
      recognition.start();
    } catch(e) {
      isListening = false;
      setOrbState('idle');
    }
  }

  // ─── Orb State Management ────────────────────────────────
  function setOrbState(state) {
    orb.className = 'orb-container';
    statusEl.className = 'status-label';
    waveform.className = 'waveform';

    if (state === 'listening') {
      orb.classList.add('listening');
      statusEl.classList.add('active');
      statusEl.textContent = 'Listening…';
      waveform.classList.add('active');
      orbIcon.textContent = '🎙️';
    } else if (state === 'thinking') {
      orb.classList.add('thinking');
      statusEl.textContent = 'Thinking…';
      orbIcon.textContent = '✦';
    } else if (state === 'speaking') {
      orb.classList.add('speaking');
      statusEl.classList.add('speaking');
      statusEl.textContent = 'Speaking…';
      orbIcon.textContent = '🔊';
    } else {
      statusEl.textContent = 'Tap orb or type below';
      orbIcon.textContent = '🎙️';
    }
  }

  function toggleListening() {
    if (!recognition) return;
    if (autoListen) {
      autoListen = false;
      isListening = false;
      try { recognition.stop(); } catch(e){}
      setOrbState('idle');
      statusEl.textContent = 'Voice mode off — tap orb to restart';
      micHint.textContent = '🎙️ Tap orb to enable voice mode';
      return;
    }
    if (isThinking || isSpeaking) return;
    autoListen = true;
    hideError();
    micHint.textContent = '🎙️ Voice mode on — tap orb to stop';
    safeStartListening();
  }

  function stopListening() {
    autoListen = false;
    isListening = false;
    if (recognition) { try { recognition.stop(); } catch(e){} }
    setOrbState('idle');
  }

  // ─── TTS ─────────────────────────────────────────────────
  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    ttsToggle.textContent = ttsEnabled ? '🔊 Voice On' : '🔇 Voice Off';
    if (!ttsEnabled && currentUtterance) { window.speechSynthesis.cancel(); setOrbState('idle'); isSpeaking = false; }
  }

  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    currentUtterance = utter;
    utter.lang = 'en-GB';
    utter.rate = 1.0;
    utter.pitch = 1.0;

    // Try to find a good voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('daniel'))
      || voices.find(v => v.lang === 'en-GB')
      || voices.find(v => v.lang.startsWith('en'));
    if (preferred) utter.voice = preferred;

    isSpeaking = true;
    setOrbState('speaking');
    utter.onend = () => { 
      isSpeaking = false; 
      if (autoListen) {
        setTimeout(() => safeStartListening(), 400);
      } else {
        setOrbState('idle');
      }
    };
    utter.onerror = () => { isSpeaking = false; setOrbState('idle'); };
    window.speechSynthesis.speak(utter);
  }

  // ─── API ─────────────────────────────────────────────────
  async function callClaude(userMessage) {
    conversation.push({ role: 'user', content: userMessage });

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are Claude, a voice assistant. Respond conversationally and concisely — you are replacing Alexa, so answers should feel natural when spoken aloud. Avoid markdown, bullet points, or formatting. Keep responses under 3 sentences for simple queries, longer only when genuinely needed. Be warm, direct, and occasionally witty. You are running in a browser voice interface.`,
        messages: conversation
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');
    conversation.push({ role: 'assistant', content: reply });
    return reply;
  }

  // ─── Process Input ───────────────────────────────────────
  async function processInput(text) {
    if (!text.trim()) return;
    hideError();

    // Remove empty state
    if (emptyState.parentNode) emptyState.remove();

    // Show user message
    addMessage('user', text);

    isThinking = true;
    setOrbState('thinking');
    sendBtn.disabled = true;

    try {
      const reply = await callClaude(text);
      addMessage('assistant', reply);
      speak(reply);
    } catch(err) {
      showError('Could not reach Claude: ' + err.message);
      setOrbState('idle');
      conversation.pop(); // remove failed user message from history
    } finally {
      isThinking = false;
      sendBtn.disabled = false;
      if (!isSpeaking) {
        if (autoListen) {
          setTimeout(() => safeStartListening(), 400);
        } else {
          setOrbState('idle');
        }
      }
    }
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-role">${role === 'user' ? 'You' : 'Claude'}</div>
      <div class="message-text">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function sendText() {
    const text = textInput.value.trim();
    if (!text || isThinking) return;
    textInput.value = '';
    processInput(text);
  }

  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  function clearConversation() {
    conversation = [];
    messagesEl.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'empty-state';
    empty.innerHTML = 'Tap the orb to speak, or type a message.<br>Ask me anything — I\'m much smarter than Alexa.';
    messagesEl.appendChild(empty);
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false;
    setOrbState('idle');
    hideError();
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }
  function hideError() { errorBanner.style.display = 'none'; }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // Load voices async
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
</script>
</body>
</html>
